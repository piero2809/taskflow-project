<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Modern Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-800 transition-colors duration-500 dark:bg-slate-950 dark:text-slate-200 min-h-screen font-sans selection:bg-teal-500 selection:text-white">
    
    <header class="bg-gradient-to-r from-teal-500 to-emerald-500 dark:from-teal-900 dark:to-emerald-900 text-white p-6 shadow-lg shadow-teal-500/20 flex justify-between items-center rounded-b-3xl mb-8">
        <div class="max-w-6xl mx-auto w-full flex justify-between items-center px-4">
            <h1 class="text-3xl font-extrabold tracking-tight">Task<span class="text-teal-100 font-medium">Flow</span></h1>
            <button id="dark-mode-toggle" class="p-3 rounded-xl bg-white/20 hover:bg-white/30 backdrop-blur-sm transition-all active:scale-95 shadow-sm">
                <span id="theme-icon" class="text-xl">🌙</span>
            </button>
        </div>
    </header>

    <div class="max-w-6xl mx-auto px-4 flex flex-col md:flex-row gap-8 pb-12">
        <main class="flex-1">
            <section class="bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-xl shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:border-slate-800 mb-8 transition-colors">
                
                <form id="task-form" class="mb-8">
                    <label for="task-input" class="block text-sm font-semibold text-slate-500 dark:text-slate-400 mb-3 uppercase tracking-wider">¿Qué vas a lograr hoy?</label>
                    <div class="flex flex-col sm:flex-row gap-3">
                        <input type="text" id="task-input" placeholder="Escribe tu nueva tarea aquí..." maxlength="100"
                            class="flex-1 p-4 rounded-xl bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none text-lg transition-all placeholder:text-slate-400">
                        <button type="submit" class="bg-teal-500 hover:bg-teal-400 text-white px-8 py-4 rounded-xl font-bold shadow-lg shadow-teal-500/30 transition-all active:scale-95 flex items-center justify-center gap-2">
                            <span>Añadir</span>
                            <span class="text-xl leading-none">+</span>
                        </button>
                    </div>
                </form>

                <div class="flex flex-col sm:flex-row gap-4 mb-8 bg-slate-50 dark:bg-slate-800/30 p-2 rounded-2xl border border-slate-100 dark:border-slate-800">
                    <input type="search" id="search-input" placeholder="🔍 Buscar tareas..." 
                           class="flex-1 p-3 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 focus:ring-2 focus:ring-teal-500 outline-none text-sm transition-all">
                    <div class="flex gap-2 flex-1">
                        <button class="filter-btn flex-1 px-4 py-3 rounded-xl text-sm font-semibold text-slate-600 dark:text-slate-400 transition-all active:scale-95" data-filter="all">Todas</button>
                        <button class="filter-btn flex-1 px-4 py-3 rounded-xl text-sm font-semibold text-slate-600 dark:text-slate-400 transition-all active:scale-95" data-filter="pending">Pendientes</button>
                        <button class="filter-btn flex-1 px-4 py-3 rounded-xl text-sm font-semibold text-slate-600 dark:text-slate-400 transition-all active:scale-95" data-filter="completed">Hechas</button>
                    </div>
                </div>

                <ul id="task-list" class="space-y-4">
                    </ul>
            </section>
        </main>

        <aside class="w-full md:w-80 space-y-6">
            <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-xl shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:border-slate-800 transition-colors">
                <h2 class="text-lg font-bold mb-6 text-slate-800 dark:text-white flex items-center gap-2">
                    📊 Resumen
                </h2>
                <div class="space-y-5">
                    <div class="flex justify-between items-center p-3 rounded-xl bg-slate-50 dark:bg-slate-800/50">
                        <span class="text-sm font-medium text-slate-500 dark:text-slate-400">Total</span>
                        <span id="stat-total" class="font-bold text-xl text-slate-700 dark:text-slate-200">0</span>
                    </div>
                    <div class="flex justify-between items-center p-3 rounded-xl bg-amber-50 dark:bg-amber-900/10">
                        <span class="text-sm font-medium text-amber-600 dark:text-amber-500">Pendientes</span>
                        <span id="stat-pending" class="font-bold text-xl text-amber-600 dark:text-amber-500">0</span>
                    </div>
                    <div class="flex justify-between items-center p-3 rounded-xl bg-emerald-50 dark:bg-emerald-900/10">
                        <span class="text-sm font-medium text-emerald-600 dark:text-emerald-500">Completadas</span>
                        <span id="stat-completed" class="font-bold text-xl text-emerald-600 dark:text-emerald-500">0</span>
                    </div>
                </div>
            </div>

            <div class="space-y-3">
                <button id="btn-complete-all" class="w-full bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 py-4 rounded-2xl font-semibold transition-all active:scale-95 shadow-sm">✨ Marcar todas listas</button>
                <button id="btn-clear-completed" class="w-full bg-red-50 dark:bg-red-900/20 text-red-500 hover:bg-red-500 hover:text-white py-4 rounded-2xl font-semibold transition-all active:scale-95 shadow-sm">🗑️ Limpiar completadas</button>
            </div>
        </aside>
    </div>

    <template id="task-template">
        <li class="task-item group bg-white dark:bg-slate-800 p-5 border border-slate-100 dark:border-slate-700/50 rounded-2xl flex items-center justify-between hover:shadow-lg hover:-translate-y-0.5 transition-all duration-300 cursor-default">
            <label class="flex items-center gap-4 cursor-pointer flex-1">
                <div class="relative flex items-center justify-center">
                    <input type="checkbox" class="task-checkbox peer appearance-none w-6 h-6 border-2 border-slate-300 dark:border-slate-600 rounded-lg checked:bg-teal-500 checked:border-teal-500 transition-all cursor-pointer">
                    <svg class="absolute w-4 h-4 text-white opacity-0 peer-checked:opacity-100 transition-opacity pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                <span class="task-title text-lg font-medium text-slate-700 dark:text-slate-200 transition-all peer-checked:text-slate-400 dark:peer-checked:text-slate-500"></span>
            </label>
            <div class="flex gap-1 opacity-0 group-hover:opacity-100 focus-within:opacity-100 transition-opacity">
                <button class="btn-edit p-2 text-slate-400 hover:text-teal-500 hover:bg-teal-50 dark:hover:bg-teal-900/30 rounded-xl transition-colors" aria-label="Editar">✏️</button>
                <button class="btn-delete p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-xl transition-colors" aria-label="Eliminar">🗑️</button>
            </div>
        </li>
    </template>

    <script src="app.js"></script>
</body>
</html>
