<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <h1>TaskFlow</h1>
    </header>

    <div class="container">
        <main class="app-main">
            <section class="controls-section">
                <form id="task-form" class="task-form">
                    <label for="task-input">Nueva tarea:</label>
                    <div class="input-group">
                        <input type="text" id="task-input" placeholder="¿Qué necesitas hacer?" required>
                        <button type="submit" class="btn-primary">Añadir</button>
                    </div>
                </form>

                <div class="filters">
                    <input type="search" id="search-input" placeholder="Buscar tareas...">
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="all">Todas</button>
                        <button class="filter-btn" data-filter="pending">Pendientes</button>
                        <button class="filter-btn" data-filter="completed">Completadas</button>
                    </div>
                </div>
            </section>

            <section class="tasks-section">
                <ul id="task-list" class="task-list"></ul>
            </section>
        </main>

        <aside class="app-sidebar">
            <h2>Estadísticas</h2>
            <div class="stats-panel">
                <p>Total: <span id="stat-total">0</span></p>
                <p>Pendientes: <span id="stat-pending">0</span></p>
                <p>Completadas: <span id="stat-completed">0</span></p>
            </div>
            <div class="bulk-actions">
                <button id="btn-complete-all" class="btn-secondary">Completar todas</button>
                <button id="btn-clear-completed" class="btn-danger">Borrar completadas</button>
            </div>
        </aside>
    </div>

    <footer class="app-footer">
        <p>&copy; 2026 TaskFlow App</p>
    </footer>

    <template id="task-template">
        <li class="task-item">
            <label class="task-label">
                <input type="checkbox" class="task-checkbox">
                <span class="task-title"></span>
            </label>
            <div class="task-actions">
                <button class="btn-edit" aria-label="Editar tarea">✏️</button>
                <button class="btn-delete" aria-label="Eliminar tarea">🗑️</button>
            </div>
        </li>
    </template>

    <script src="app.js"></script>
</body>

</html>
